<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PattKnitter</title>

   <!-- Stylesheets only in <head> -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
   <link rel="stylesheet" href="style.css">
</head>

<body>

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid ps-4">
         <a class="navbar-brand fw-bold" href="#">PattKnitter</a>
         <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
               <li class="nav-item"><a class="nav-link active" href="index.html">Generator</a></li>
               <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
               <li class="nav-item"><a class="nav-link d-flex align-items-center gap-1" href="https://github.com/GeorgiaSweeny/pattKnitter" target="_blank" rel="noopener">GitHub <img src="images/GitHub_Invertocat_Black_Clearspace.svg" alt="GitHub" height="16"></a></li>
            </ul>
         </div>
      </div>
   </nav>

   <div class="container-fluid" id="app">
      <div class="row g-0 h-100">

         <div class="col-9 d-flex justify-content-center align-items-center p-4 overflow-hidden" id="canvas-workspace">
            <div id="canvas-container"></div>
         </div>

         <div class="col-3 p-3 overflow-auto" id="control-panel">

            <h6 class="panel-section-title text-uppercase fw-semibold section-toggle"
                role="button" data-bs-toggle="collapse" data-bs-target="#canvas-collapse">
               Canvas <span class="section-chevron">&#8250;</span>
            </h6>
            <div class="collapse show" id="canvas-collapse">
               <div id="canvas-controls"></div>
            </div>

            <hr class="border-secondary">

            <h6 class="panel-section-title text-uppercase fw-semibold section-toggle"
                role="button" data-bs-toggle="collapse" data-bs-target="#pattern-collapse">
               Pattern <span class="section-chevron">&#8250;</span>
            </h6>
            <div class="collapse show" id="pattern-collapse">
               <div id="pattern-list"></div>
            </div>

            <hr class="border-secondary">

            <h6 class="panel-section-title text-uppercase fw-semibold section-toggle"
                role="button" data-bs-toggle="collapse" data-bs-target="#params-collapse">
               Parameters <span class="section-chevron">&#8250;</span>
            </h6>
            <div class="collapse show" id="params-collapse">
               <div id="params-container"></div>
            </div>

         </div>

      </div>
   </div>

   <!-- Scripts at end of <body> in dependency order.
        Synchronous scripts (p5, Bootstrap) run immediately;
        type="module" is implicitly deferred so it always runs after them. -->
   <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
   <script type="module" src="main.js"></script>

</body>
</html>
