<!DOCTYPE html>

<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <title>PattKnitter</title>

   <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

   <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

   <nav class="navbar navbar-expand-lg bg-light">
      <div class="container">
         <a class="navbar-brand" href="#">PattKnitter</a>
         <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
               <li class="nav-item"><a class="nav-link" href="#">Generator</a></li>
               <li class="nav-item"><a class="nav-link" href="#">About</a></li>
               <li class="nav-item"><a class="nav-link d-flex align-items-center gap-1" href="#">GitHub <img src="images/GitHub_Invertocat_Black_Clearspace.svg" alt="GitHub" height="16"></a></li>
            </ul>
         </div>
      </div>
   </nav>

   <div id="app">

      <div id="canvas-container"></div>

      <div id="control-panel">

         <h6 class="panel-section-title">Pattern</h6>

         <!-- Pattern list built dynamically from REGISTRY in ui.js -->
         <div id="pattern-list"></div>

         <hr>

         <h6 class="panel-section-title">Parameters</h6>

         <!-- Controls built dynamically from schema by PatternLoader -->
         <div id="params-container"></div>

      </div>
   </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
